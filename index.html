<script>
    // Resume cache-buster
    const today = new Date().toISOString().slice(0, 10);
    const link = document.getElementById('resume-link');
    link.href = link.href + '?v=' + today;

    // Hide preloader once page is ready
    window.addEventListener('load', function () {
        const preloader = document.getElementById('preloader');
        preloader.classList.add('hidden');
        setTimeout(function () { preloader.style.display = 'none'; }, 500);
    });

    // Easter eggs
    (function () {
        const fenerEgg = document.getElementById('fener-egg');
        const podufEgg = document.getElementById('poduf-egg');
        let fenerTimer = null;
        let podufuTimer = null;

        const faviconEl = document.querySelector('link[rel="icon"]');
        const originalFavicon = faviconEl.href;
        let faviconResetTimer = null;

        function setFavicon(src) {
            faviconEl.href = src;
            clearTimeout(faviconResetTimer);
            faviconResetTimer = setTimeout(function () {
                faviconEl.href = originalFavicon;
            }, 7500);
        }

        function emojiFavicon(emoji) {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.font = '52px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, 32, 36);
            return canvas.toDataURL('image/png');
        }

        function spawnRain(items) {
            const container = document.getElementById('egg-rain');
            for (let i = 0; i < 30; i++) {
                const item = items[Math.floor(Math.random() * items.length)];
                let el;
                if (item.startsWith('http') || item.startsWith('/') || item.startsWith('.')) {
                    el = document.createElement('img');
                    el.src = item;
                    el.alt = '';
                    el.style.width = (24 + Math.random() * 32) + 'px';
                    el.style.height = 'auto';
                } else {
                    el = document.createElement('span');
                    el.textContent = item;
                    el.style.fontSize = (1.2 + Math.random() * 2) + 'rem';
                }
                el.className = 'egg-rain__icon';
                el.style.left = (Math.random() * 100) + '%';
                el.style.animationDelay = (Math.random() * 2.5) + 's';
                el.addEventListener('animationend', function () { el.remove(); });
                container.appendChild(el);
            }
        }

        function showFener() {
            setFavicon('./images/fenerbahce.png');
            spawnRain(['./images/fenerbahce.png']);
        }

        function showPodufu() {
            setFavicon(emojiFavicon('😈'));
            spawnRain(['😈']);
        }

        let buffer = '';
        document.addEventListener('keydown', function (e) {
            buffer = (buffer + e.key).toLowerCase().slice(-5);
            if (buffer.slice(-5) === 'fener' || buffer.slice(-2) === 'fb') {
                buffer = '';
                showFener();
            } else if (buffer.slice(-3) === 'pöd' || buffer.slice(-3) === 'pod') {
                buffer = '';
                showPodufu();
            }
        });
    })();
</script>
