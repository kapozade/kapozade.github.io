<script>
    // Resume cache-buster
    const today = new Date().toISOString().slice(0, 10);
    const link = document.getElementById('resume-link');
    link.href = link.href + '?v=' + today;

    // Hide preloader once page is ready
    window.addEventListener('load', function () {
        const preloader = document.getElementById('preloader');
        preloader.classList.add('hidden');
        setTimeout(function () { preloader.style.display = 'none'; }, 500);
    });

    // Easter eggs
    (function () {
        const fenerEgg = document.getElementById('fener-egg');
        const podufEgg = document.getElementById('poduf-egg');
        let fenerTimer = null;
        let podufuTimer = null;

        function showFener() {
            clearTimeout(fenerTimer);
            fenerEgg.classList.add('fener-egg--visible');
            fenerTimer = setTimeout(function () {
                fenerEgg.classList.remove('fener-egg--visible');
            }, 3000);
        }

        function showPodufu() {
            clearTimeout(podufuTimer);
            podufEgg.classList.add('poduf-egg--visible');
            podufuTimer = setTimeout(function () {
                podufEgg.classList.remove('poduf-egg--visible');
            }, 3000);
        }

        // Desktop: type "fener"
        let buffer = '';
        document.addEventListener('keydown', function (e) {
            buffer = (buffer + e.key).toLowerCase().slice(-5);
            if (buffer === 'fener') {
                buffer = '';
                showFener();
            }
        });

        // Mobile: shake gesture → Pödüfü egg
        var lastX, lastY, lastZ;
        var THRESHOLD = 15;

        function startShakeListener() {
            window.addEventListener('devicemotion', function (e) {
                var acc = e.accelerationIncludingGravity;
                if (!acc) return;
                if (lastX == null) { lastX = acc.x; lastY = acc.y; lastZ = acc.z; return; }
                var delta = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY) + Math.abs(acc.z - lastZ);
                if (delta > THRESHOLD) showPodufu();
                lastX = acc.x; lastY = acc.y; lastZ = acc.z;
            });
        }

        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            // iOS 13+ — request permission on first tap
            document.addEventListener('touchend', function requestMotion() {
                DeviceMotionEvent.requestPermission().then(function (state) {
                    if (state === 'granted') startShakeListener();
                }).catch(function () {});
                document.removeEventListener('touchend', requestMotion);
            }, { once: true });
        } else {
            startShakeListener();
        }
    })();
</script>
